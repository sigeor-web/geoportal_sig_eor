<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIG-EOR | Mapa Alimentadores</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/shared.css">

  <style>
    /* ── Layout ── */
    .map-container { display:flex; flex:1; overflow:hidden; position:relative; }

    /* ── Panel lateral de alimentadores ── */
    .alim-panel {
      width: 280px;
      flex-shrink: 0;
      background: #f5f7fa;
      border-right: 1px solid #dce3ef;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }
    .alim-panel-header {
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .alim-panel-search {
      padding: 8px 10px;
      border-bottom: 1px solid #dce3ef;
      flex-shrink: 0;
    }
    .alim-panel-search input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #dce3ef;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text);
    }
    .alim-list {
      overflow-y: auto;
      flex: 1;
    }
    .alim-item {
      padding: 8px 14px;
      border-bottom: 1px solid #eaeef4;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .15s;
    }
    .alim-item:hover { background: #e8edf5; }
    .alim-item.active { background: #d0dff5; border-left: 3px solid var(--accent); }
    .alim-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .alim-item-text { flex: 1; min-width: 0; }
    .alim-item-id {
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: var(--text-light);
    }
    .alim-item-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Mapa ── */
    #map { flex:1; }

    /* ── Layer panel flotante ── */
    .layer-panel {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 1000;
      background: rgba(26,39,68,.93);
      color: #ccd6f6;
      border-radius: 8px;
      padding: 12px 14px;
      min-width: 180px;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
    }
    .layer-panel-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #fff;
      margin-bottom: 8px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .layer-panel-close {
      background: none; border: none; color: #ccd6f6;
      cursor: pointer; font-size: 14px; line-height:1;
    }
    .layer-section-title {
      font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; color: #7b93c4;
      margin: 8px 0 4px; font-weight: 600;
    }
    .layer-option {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 0; cursor: pointer;
    }
    .layer-option input[type=radio],
    .layer-option input[type=checkbox] { accent-color: var(--accent-light); }
    .legend-line {
      width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0;
    }
    #layerOpenBtn {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: var(--primary); color: #ccd6f6; border: none;
      border-radius: 6px; padding: 6px 10px; cursor: pointer;
      font-size: 13px; font-weight: 600; letter-spacing: .5px;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      display: none;
    }

    /* ── Print ── */
    @media print {
      body, html { margin:0; padding:0; }
      header, .alim-panel, .layer-panel, #layerOpenBtn,
      .leaflet-control-zoom, .leaflet-control-attribution,
      .leaflet-bar { display: none !important; }
      .map-container { display: block !important; }
      #map {
        position: fixed !important;
        top:0 !important; left:0 !important;
        width:100vw !important; height:100vh !important;
      }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header>
    <div style="display:flex;align-items:center;">
      <a href="index.html" class="header-logo">SIG<span>-EOR</span></a>
      <div class="header-divider"></div>
      <div class="header-page">Mapa Alimentadores</div>
    </div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="subestaciones.html">Subestaciones</a>
      <a href="alimentadores.html">Alimentadores</a>
      <a href="mapa_alimentadores.html" class="active">Mapa Alim.</a>
      <a href="Unifilar_eor.drawio_actual.html" target="_blank">Diagrama</a>
    </nav>
  </header>

  <!-- ── CONTENIDO ──────────────────────────────────────────── -->
  <div class="map-container">

    <!-- Panel lateral -->
    <div class="alim-panel">
      <div class="alim-panel-header">
        <span>⚡ Alimentadores</span>
        <span id="alimCount" style="font-size:11px;opacity:.7;">Cargando...</span>
      </div>
      <div class="alim-panel-search">
        <input type="text" id="alimSearch" placeholder="🔍  Buscar alimentador...">
      </div>
      <div class="alim-list" id="alimList"></div>
    </div>

    <!-- Mapa Leaflet -->
    <div id="map"></div>

    <!-- Panel de capas -->
    <div class="layer-panel" id="layerPanel">
      <div class="layer-panel-title">
        Capas
        <button class="layer-panel-close" onclick="toggleLayerPanel()" title="Cerrar">✕</button>
      </div>

      <div id="layerPanelContent">
        <div class="layer-section-title">Mapa base</div>
        <label class="layer-option">
          <input type="radio" name="basemap" value="osm" checked onchange="changeBasemap(this.value)">
          OpenStreetMap
        </label>
        <label class="layer-option">
          <input type="radio" name="basemap" value="satellite" onchange="changeBasemap(this.value)">
          Satélite
        </label>
        <label class="layer-option">
          <input type="radio" name="basemap" value="topo" onchange="changeBasemap(this.value)">
          TopoMap
        </label>

        <div class="layer-section-title">Capas</div>
        <label class="layer-option">
          <div class="legend-line" style="background:#2980b9;"></div>
          <input type="checkbox" checked onchange="toggleAllAlim(this.checked)">
          Todos los alim.
        </label>
        <label class="layer-option">
          <div class="legend-line" style="background:#2980b9;border:2px solid #1a2744;border-radius:50%;width:10px;height:10px;"></div>
          <input type="checkbox" checked onchange="toggleSubLayer(this.checked)">
          Subestaciones
        </label>
      </div>
    </div>

    <button id="layerOpenBtn" onclick="toggleLayerPanel()">☰ Capas</button>

  </div><!-- /.map-container -->

  <script src="js/mapa_alimentadores.js"></script>

  <script>
    function toggleLayerPanel() {
      const panel   = document.getElementById('layerPanel');
      const openBtn = document.getElementById('layerOpenBtn');
      const hidden  = panel.style.display === 'none';
      panel.style.display   = hidden ? '' : 'none';
      openBtn.style.display = hidden ? 'none' : 'block';
    }
  </script>

</body>
</html>
